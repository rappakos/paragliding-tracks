<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermal Trigger Visualizer</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #map { width: 100%; height: 100%; }

    #panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.92);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      min-width: 260px;
      z-index: 10;
    }
    #panel h2 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #333; }
    #panel label { font-size: 12px; color: #555; display: block; margin-bottom: 0; }
    #panel .ctrl-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    #panel .ctrl-row label { margin-bottom: 0; white-space: nowrap; width: 60px; flex-shrink: 0; font-size: 11px; }
    #panel .ctrl-row select,
    #panel .ctrl-row input[type=datetime-local] { flex: 1; min-width: 0; font-size: 11px; padding: 2px 4px; }
    #panel .toggle-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    #panel .toggle-row input[type=checkbox] { margin: 0; flex-shrink: 0; }
    #panel .toggle-row label { margin-bottom: 0; width: 52px; flex-shrink: 0; font-size: 11px; white-space: nowrap; }
    #panel .toggle-row input[type=range] { flex: 1; min-width: 0; margin: 0; }
    #panel input[type=range] { height: 4px; accent-color: #2563eb; }
    #arrow-svg {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.85);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 10;
    }
    #status { font-size: 11px; color: #888; margin-top: 6px; }

    #igc-section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
    }
    #igc-section summary { font-size: 12px; font-weight: 600; cursor: pointer; color: #333; }
    #igc-section .igc-body { margin-top: 8px; }
    #igc-section input[type=file] { font-size: 11px; margin-bottom: 6px; }
    #igc-section button {
      font-size: 11px; padding: 3px 10px; border: none; border-radius: 4px; cursor: pointer;
    }
    #igc-upload-btn { background: #2563eb; color: #fff; }
    #igc-upload-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    #igc-clear-btn { background: #dc2626; color: #fff; margin-left: 4px; }
    #igc-info { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.4; }
    #igc-track-list { font-size: 11px; margin-top: 6px; }
    #igc-track-list select { width: 100%; font-size: 11px; padding: 2px; }

    /* Mobile: compact panel */
    @media (max-width: 600px) {
      #panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        border-radius: 12px 12px 0 0;
        min-width: unset;
        padding: 10px 12px;
        max-height: 45vh;
        overflow-y: auto;
      }
      #panel h2 { font-size: 13px; margin-bottom: 6px; }
      #panel label { font-size: 11px; }
      #arrow-svg { width: 70px; height: 70px; top: 8px; left: 8px; padding: 2px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <a href="/" style="font-size:12px;text-decoration:none;background:#333;color:#fff;padding:3px 8px;border-radius:4px;">⌂ Home</a>
      <a href="https://github.com/rappakos/paragliding-tracks/blob/main/README.md" style="font-size:12px;text-decoration:none;background:#333;color:#fff;padding:3px 8px;border-radius:4px;">Background</a>
    </div>
    <h2>☀ Thermal Trigger Visualizer</h2>

    <div class="ctrl-row">
      <label for="region-select">Region</label>
      <select id="region-select">
        <option value="weserbergland">Weserbergland</option>
        <option value="westharz">Western Harz</option>
      </select>
    </div>

    <div class="ctrl-row">
      <label for="dt-picker">Date/Time</label>
      <input type="datetime-local" id="dt-picker" />
    </div>

    <div class="toggle-row">
      <span style="width:13px;flex-shrink:0"></span>
      <label for="opacity-map">🗺️ Map</label>
      <input type="range" id="opacity-map" min="0" max="100" value="15" />
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="toggle-thermal" checked />
      <label for="toggle-thermal">☀ Thermal</label>
      <input type="range" id="opacity-thermal" min="0" max="100" value="33" />
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="toggle-wind" checked />
      <label for="toggle-wind">💨 Wind</label>
      <input type="range" id="opacity-wind" min="0" max="100" value="100" />
    </div>

    <div style="font-size:10px;color:#666;margin-top:8px;line-height:1.5;">
      <b>Legend:</b><br/>
      Thermal: <span style="color:#f59e0b;">■</span> orange–magenta = strong slope heating<br/>
      Wind: <span style="color:#d4b200;">■</span> yellow = luv (windward), <span style="color:#3b82f6;">■</span> blue = lee
    </div>

    <div id="status">Loading…</div>

    <details id="igc-section" open>
      <summary>🪂 IGC Track</summary>
      <div class="igc-body">
        <input type="file" id="igc-file" accept=".igc" />
        <div>
          <button id="igc-upload-btn" disabled>Upload</button>
          <button id="igc-clear-btn" style="display:none">Clear</button>
        </div>
        <div id="igc-info"></div>
        <div id="igc-track-list">
          <label>Previous tracks:</label>
          <select id="igc-select"><option value="">— none —</option></select>
        </div>
      </div>
    </details>
  </div>

  <svg id="arrow-svg" width="130" height="130" viewBox="-65 -65 130 130">
    <!-- Compass circle + cardinal directions -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#e5e7eb" stroke-width="1" />
    <text x="0" y="-44" text-anchor="middle" font-size="9" fill="#6b7280">N</text>
    <text x="0" y="52" text-anchor="middle" font-size="9" fill="#6b7280">S</text>
    <text x="46" y="4" text-anchor="middle" font-size="9" fill="#6b7280">E</text>
    <text x="-46" y="4" text-anchor="middle" font-size="9" fill="#6b7280">W</text>
    <!-- Sun icon (placed on circle edge, rotated by JS) -->
    <g id="sun-icon" transform="rotate(0)">
      <g transform="translate(0,-42)">
        <circle cx="0" cy="0" r="7" fill="#f59e0b" />
        <!-- Sun rays -->
        <line x1="0" y1="-10" x2="0" y2="-13" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="10" x2="0" y2="13" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="-10" y1="0" x2="-13" y2="0" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="10" y1="0" x2="13" y2="0" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="-7" y1="-7" x2="-9.5" y2="-9.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="7" y1="-7" x2="9.5" y2="-9.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="-7" y1="7" x2="-9.5" y2="9.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
        <line x1="7" y1="7" x2="9.5" y2="9.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
      </g>
    </g>
    <!-- Windsock: mouth at circle edge (wind-FROM side), tapers toward center -->
    <g id="windsock-icon" transform="rotate(0)">
      <!-- Sock body: wide mouth at y=-50, narrows toward center at y=-20 -->
      <polygon points="-7,-50 7,-50 4,-38 2,-26" fill="#e63946" opacity="0.8" />
      <polygon points="-7,-50 7,-50 4,-38 -4,-38" fill="#fff" opacity="0.5" />
      <!-- Stripes -->
      <polygon points="-5.8,-46 5.8,-46 5,-42 -5,-42" fill="#fff" opacity="0.6" />
      <polygon points="-4.2,-38 4.2,-38 3.4,-34 -3.4,-34" fill="#fff" opacity="0.6" />
      <!-- Mouth ring -->
      <ellipse cx="0" cy="-50" rx="7" ry="2.5" fill="none" stroke="#c1121f" stroke-width="1.5" />
    </g>
  </svg>

  <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
  <script>
  (function() {
    const API_BASE = window.location.pathname.replace(/\/[^/]*$/, "");  // auto-detect sub-path

    // ── Constants ─────────────────────────────────────────────────────────
    const TRANSPARENT_1PX = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";

    // ── Regions ───────────────────────────────────────────────────────────
    const REGIONS = {
      weserbergland: { bbox: [9.21, 51.74, 9.80, 52.12], zoom: 11 },
      westharz:      { bbox: [10.1208, 51.4377, 11.1162, 51.9623], zoom: 12, center: [10.43088409100252, 51.88986475598365] },
    };
    let BBOX = REGIONS.weserbergland.bbox;
    const CENTER_LON = (BBOX[0] + BBOX[2]) / 2;
    const CENTER_LAT = (BBOX[1] + BBOX[3]) / 2;

    // ── Map init ──────────────────────────────────────────────────────────
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          osm: {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "© OpenStreetMap contributors",
          },
        },
        layers: [{ id: "osm", type: "raster", source: "osm", paint: { "raster-opacity": 0.15 } }],
      },
      center: [CENTER_LON, CENTER_LAT],
      zoom: 11,
    });

    // ── Status helper ─────────────────────────────────────────────────────
    const statusEl = document.getElementById("status");
    function setStatus(msg) { statusEl.textContent = msg; }

    // ── Datetime picker ───────────────────────────────────────────────────
    const dtPicker = document.getElementById("dt-picker");
    function nowLocalISO() {
      const d = new Date();
      d.setSeconds(0, 0);
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    dtPicker.value = nowLocalISO();

    // ── Arrow helpers ─────────────────────────────────────────────────────
    function setSunPosition(azDeg) {
      // Rotate sun icon group: azimuth 0=N → SVG rotate 0 is up
      document.getElementById("sun-icon").setAttribute("transform", `rotate(${azDeg})`);
    }
    function setWindDirection(azDeg) {
      // Rotate windsock so mouth faces the wind-FROM direction
      // azDeg is direction wind blows TO; mouth should face FROM = azDeg + 180
      const fromAz = (azDeg + 180) % 360;
      document.getElementById("windsock-icon").setAttribute("transform", `rotate(${fromAz})`);
    }

    // ── Image source helpers ──────────────────────────────────────────────
    function getOverlayCoords() {
      return [
        [BBOX[0], BBOX[3]], // top-left NW
        [BBOX[2], BBOX[3]], // top-right NE
        [BBOX[2], BBOX[1]], // bottom-right SE
        [BBOX[0], BBOX[1]], // bottom-left SW
      ];
    }

    map.on("load", () => {
      // Add thermal overlay source + layer
      map.addSource("thermal", {
        type: "image",
        url: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==",
        coordinates: getOverlayCoords(),
      });
      map.addLayer({ id: "thermal-layer", type: "raster", source: "thermal", paint: { "raster-opacity": 0.33 } });

      // Add wind overlay source + layer
      map.addSource("wind-overlay", {
        type: "image",
        url: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==",
        coordinates: getOverlayCoords(),
      });
      map.addLayer({ id: "wind-layer", type: "raster", source: "wind-overlay", paint: { "raster-opacity": 1.0 } });

      // Add IGC track source + layer (GeoJSON line)
      map.addSource("track-source", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] },
      });
      map.addLayer({
        id: "track-layer",
        type: "line",
        source: "track-source",
        paint: {
          "line-color": "#e63946",
          "line-width": 3,
          "line-opacity": 0.85,
        },
      });

      // Initial data load
      refreshAll();
      loadTrackList();
    });

    // ── Toggle + opacity ──────────────────────────────────────────────────
    document.getElementById("toggle-thermal").addEventListener("change", (e) => {
      map.setLayoutProperty("thermal-layer", "visibility", e.target.checked ? "visible" : "none");
    });
    document.getElementById("toggle-wind").addEventListener("change", (e) => {
      map.setLayoutProperty("wind-layer", "visibility", e.target.checked ? "visible" : "none");
    });
    document.getElementById("opacity-thermal").addEventListener("input", (e) => {
      map.setPaintProperty("thermal-layer", "raster-opacity", e.target.value / 100);
    });
    document.getElementById("opacity-wind").addEventListener("input", (e) => {
      map.setPaintProperty("wind-layer", "raster-opacity", e.target.value / 100);
    });
    document.getElementById("opacity-map").addEventListener("input", (e) => {
      map.setPaintProperty("osm", "raster-opacity", e.target.value / 100);
    });

    // ── Region switch ─────────────────────────────────────────────────────
    const regionSelect = document.getElementById("region-select");

    function switchRegion(regionKey) {
      const region = REGIONS[regionKey];
      if (!region) return;
      BBOX = region.bbox;
      regionSelect.value = regionKey;
      const coords = getOverlayCoords();
      map.getSource("thermal").setCoordinates(coords);
      map.getSource("wind-overlay").setCoordinates(coords);
    }

    function findRegionForPoint(lon, lat) {
      for (const [key, region] of Object.entries(REGIONS)) {
        const [w, s, e, n] = region.bbox;
        if (lon >= w && lon <= e && lat >= s && lat <= n) return key;
      }
      return null;
    }

    regionSelect.addEventListener("change", (e) => {
      switchRegion(e.target.value);
      const center = REGIONS[e.target.value].center || [(BBOX[0] + BBOX[2]) / 2, (BBOX[1] + BBOX[3]) / 2];
      map.flyTo({ center: center, zoom: REGIONS[e.target.value].zoom });
      refreshAll();
    });

    // ── Refresh on datetime change ─────────────────────────────────────────
    let refreshTimer = null;
    dtPicker.addEventListener("change", () => {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refreshAll, 300);
    });

    async function refreshAll() {
      const dtValue = dtPicker.value;  // local ISO
      const dt = new Date(dtValue).toISOString();
      const bboxStr = BBOX.join(",");
      setStatus("Loading…");

      // Clear overlays immediately so stale data isn't shown during load
      const coords = getOverlayCoords();
      map.getSource("thermal").updateImage({ url: TRANSPARENT_1PX, coordinates: coords });
      map.getSource("wind-overlay").updateImage({ url: TRANSPARENT_1PX, coordinates: coords });
      map.triggerRepaint();

      try {
        const [sunData, windData] = await Promise.all([
          fetchJSON(`/sun?bbox=${bboxStr}&datetime=${encodeURIComponent(dt)}`),
          fetchJSON(`/wind?bbox=${bboxStr}&datetime=${encodeURIComponent(dt)}`),
        ]);

        // Update sun & wind indicators
        setSunPosition(sunData.azimuth);
        // Wind: mean_vec is [east, north, 0]; convert to azimuth (direction wind blows FROM)
        const we = windData.mean_vec[0], wn = windData.mean_vec[1];
        const windAz = (Math.atan2(we, wn) * 180 / Math.PI + 360) % 360;
        setWindDirection(windAz);

        // Update overlay PNGs
        await Promise.all([
          updateImageSource("thermal", `/overlay/thermal?bbox=${bboxStr}&datetime=${encodeURIComponent(dt)}`),
          updateImageSource("wind-overlay", `/overlay/wind?bbox=${bboxStr}&datetime=${encodeURIComponent(dt)}`),
        ]);

        setStatus(`Updated ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus("Error: " + err.message);
        console.error(err);
      }
    }

    async function fetchJSON(url) {
      const headers = {};
      if (url.startsWith("/igc/")) headers["X-Owner-Token"] = OWNER_TOKEN;
      const resp = await fetch(API_BASE + url, { headers });
      if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${url}`);
      return resp.json();
    }

    async function updateImageSource(sourceId, url) {
      const resp = await fetch(API_BASE + url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${url}`);
      const blob = await resp.blob();
      const objectUrl = URL.createObjectURL(blob);

      // Pre-load image so MapLibre has pixel data immediately
      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = reject;
        img.src = objectUrl;
      });

      map.getSource(sourceId).updateImage({ url: objectUrl, coordinates: getOverlayCoords() });
      map.triggerRepaint();
    }

    // ── Owner token (localStorage) ───────────────────────────────────────
    function getOwnerToken() {
      let token = localStorage.getItem("ttv_owner_token");
      if (!token) {
        token = crypto.randomUUID();
        localStorage.setItem("ttv_owner_token", token);
      }
      return token;
    }
    const OWNER_TOKEN = getOwnerToken();

    // ── IGC Track Upload & Selection ──────────────────────────────────────
    const igcFileInput = document.getElementById("igc-file");
    const igcUploadBtn = document.getElementById("igc-upload-btn");
    const igcClearBtn = document.getElementById("igc-clear-btn");
    const igcInfo = document.getElementById("igc-info");
    const igcSelect = document.getElementById("igc-select");

    igcFileInput.addEventListener("change", () => {
      igcUploadBtn.disabled = !igcFileInput.files.length;
    });

    igcUploadBtn.addEventListener("click", async () => {
      const file = igcFileInput.files[0];
      if (!file) return;

      igcUploadBtn.disabled = true;
      setStatus("Uploading IGC…");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const resp = await fetch(API_BASE + "/igc/upload", { method: "POST", body: formData, headers: { "X-Owner-Token": OWNER_TOKEN } });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        const track = await resp.json();
        showTrack(track);
        loadTrackList();
        setStatus("Track loaded.");
      } catch (err) {
        setStatus("Upload error: " + err.message);
        console.error(err);
      } finally {
        igcUploadBtn.disabled = false;
      }
    });

    igcClearBtn.addEventListener("click", () => {
      clearTrack();
      igcSelect.value = "";
    });

    igcSelect.addEventListener("change", async (e) => {
      const id = e.target.value;
      if (!id) { clearTrack(); return; }

      setStatus("Loading track…");
      try {
        const track = await fetchJSON(`/igc/tracks/${id}`);
        showTrack(track);
      } catch (err) {
        setStatus("Error: " + err.message);
      }
    });

    function showTrack(track) {
      // Display GeoJSON on map
      map.getSource("track-source").setData(track.geojson);

      // Show track info
      const parts = [];
      if (track.pilot) parts.push(`<b>Pilot:</b> ${escHtml(track.pilot)}`);
      if (track.glider) parts.push(`<b>Glider:</b> ${escHtml(track.glider)}`);
      if (track.start_time) parts.push(`<b>Start:</b> ${track.start_time.replace("T", " ").slice(0, 16)}`);
      igcInfo.innerHTML = parts.join("<br/>");
      igcClearBtn.style.display = "inline";

      // Auto-detect matching region based on track center point
      if (track.bbox && track.bbox.length === 4) {
        const cx = (track.bbox[0] + track.bbox[2]) / 2;
        const cy = (track.bbox[1] + track.bbox[3]) / 2;
        const matchedRegion = findRegionForPoint(cx, cy);
        if (matchedRegion) {
          switchRegion(matchedRegion);
        }
        map.fitBounds([[track.bbox[0], track.bbox[1]], [track.bbox[2], track.bbox[3]]], { padding: 40 });
      }

      // Set datetime picker to track start time (if available) and refresh overlays
      if (track.start_time) {
        const dt = new Date(track.start_time);
        if (!isNaN(dt.getTime())) {
          const pad = (n) => String(n).padStart(2, "0");
          dtPicker.value = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
        }
      }
      // Always refresh overlays after region/time change
      refreshAll();
    }

    function clearTrack() {
      map.getSource("track-source").setData({ type: "FeatureCollection", features: [] });
      igcInfo.innerHTML = "";
      igcClearBtn.style.display = "none";
      // Reset to current time
      dtPicker.value = nowLocalISO();
      refreshAll();
    }

    async function loadTrackList() {
      try {
        const tracks = await fetchJSON("/igc/tracks");
        igcSelect.innerHTML = '<option value="">— none —</option>';
        for (const t of tracks) {
          const label = `${t.filename} (${t.start_time ? t.start_time.slice(0, 10) : "?"})`;
          igcSelect.innerHTML += `<option value="${t.id}">${escHtml(label)}</option>`;
        }
      } catch (e) {
        // Track list is non-critical
        console.warn("Failed to load track list:", e);
      }
    }

    function escHtml(s) {
      const el = document.createElement("span");
      el.textContent = s;
      return el.innerHTML;
    }

  })();
  </script>
</body>
</html>
